version: '3.8'

services:
  backend:
    build: .
    container_name: aiplanning_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - aiplanning_network

  frontend:
    build: ./frontend
    container_name: aiplanning_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - aiplanning_network

networks:
  aiplanning_network:
    driver: bridge
